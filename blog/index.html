<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog — Kang-il Lee</title>
    <meta name="description" content="Blog posts by Kang-il Lee." />
    <style>
      :root{
        --fg:#111; --muted:#666; --line:#ececec; --bg:#fff; --chip:#f6f6f6;
        --max: 900px;
      }
      *{box-sizing:border-box}
      body{font-family: system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans","Noto Sans KR",sans-serif; color:var(--fg); background:var(--bg); margin:0}
      header, main, footer{padding:24px}
      .wrap{max-width:var(--max); margin:0 auto}
      h1{font-size:2rem;margin:.2rem 0}
      h2{font-size:1.1rem;margin:0 0 4px}
      p,li{line-height:1.6}
      .muted{color:var(--muted)}
      nav a{margin-right:14px;text-decoration:none}
      a{color:var(--fg)}
      section{padding:20px 0;border-top:1px solid var(--line)}
      .small{font-size:.95rem}
      footer{border-top:1px solid var(--line)}

      /* Post list */
      .post-list{list-style:none;padding:0;margin:0}
      .post-item{padding:20px 0;border-bottom:1px solid var(--line)}
      .post-item:last-child{border-bottom:none}
      .post-meta{font-size:.85rem;color:var(--muted);margin-bottom:4px}
      .post-title{font-size:1.2rem;font-weight:600;margin:0 0 6px;line-height:1.3}
      .post-title a{text-decoration:none}
      .post-title a:hover{text-decoration:underline}
      .post-desc{font-size:.95rem;color:var(--muted);margin:0}
      .tag{display:inline-block;padding:2px 8px;background:var(--chip);border:1px solid var(--line);border-radius:999px;font-size:.8rem;margin-right:4px}
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div style="margin-bottom:12px">
          <a href="/" class="small muted" style="text-decoration:none">&larr; Kang-il Lee</a>
        </div>
        <h1>Blog</h1>
        <p class="small muted">Posts on world models and machine learning research.</p>
      </div>
    </header>

    <main>
      <div class="wrap">
        <ul class="post-list">

          <li class="post-item">
            <div class="post-meta">March 2026 &middot; <span class="tag">World Models</span></div>
            <h2 class="post-title"><a href="/blog/posts/world-model-intro/">Building a World Model from Scratch</a></h2>
            <p class="post-desc">Building a world model.</p>
          </li>

          <!-- Add new posts above this line -->

        </ul>
      </div>
    </main>

    <footer>
      <div class="wrap">
        <p class="small muted">&copy; <span id="y"></span> Kang-il Lee</p>
      </div>
    </footer>
    <script>document.getElementById('y').textContent = new Date().getFullYear()</script>
  </body>
</html>
